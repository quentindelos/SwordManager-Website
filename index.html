<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mini Password Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h1>Mini Password Manager</h1>

    <!-- Écran 1 : mot de passe maître -->
    <div id="master-screen">
      <h2>Déverrouiller le coffre</h2>
      <p>Choisis un mot de passe maître (ou entre le même que d'habitude).</p>
      <input type="password" id="master-password" placeholder="Mot de passe maître" />
      <button id="unlock-btn">Déverrouiller</button>
      <p class="hint">
        Le coffre est chiffré localement dans ton navigateur avec ce mot de passe maître.
      </p>
      <p id="master-error" class="error"></p>
    </div>

    <!-- Écran 2 : coffre déverrouillé -->
    <div id="vault-screen" class="hidden">
      <div class="toolbar">
        <button id="lock-btn">Verrouiller</button>
      </div>

      <h2>Mes identifiants</h2>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Rechercher par nom de site..." />
      </div>

      <table id="entries-table">
        <thead>
          <tr>
            <th>Nom</th>
            <th>URL</th>
            <th>Identifiant</th>
            <th>Mot de passe</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="entries-body">
          <!-- lignes générées en JS -->
        </tbody>
      </table>

      <h3>Ajouter / Modifier une entrée</h3>
      <form id="entry-form">
        <input type="hidden" id="entry-id" />
        <div class="field">
          <label>Nom</label>
          <input type="text" id="entry-name" required />
        </div>
        <div class="field">
          <label>URL</label>
          <input type="url" id="entry-url" />
        </div>
        <div class="field">
          <label>Identifiant</label>
          <input type="text" id="entry-username" />
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="text" id="entry-password" />
          <button type="button" id="generate-btn">Générer</button>
        </div>
        <button type="submit">Enregistrer</button>
        <button type="button" id="reset-form-btn">Annuler</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
